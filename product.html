<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Chi tiết sản phẩm</title>

<style>
body{font-family:Arial;padding:20px;background:#f4f4f9}
.box{max-width:800px;margin:auto;background:#fff;padding:20px;border-radius:10px}
img{width:100%;max-height:300px;object-fit:cover;border-radius:10px}
.price{color:#e91e63;font-weight:bold;font-size:20px;margin:10px 0}
button{padding:10px;background:#e91e63;color:#fff;border:none;border-radius:5px}
</style>
</head>

<body>

<div class="box">
<img id="img">
<h2 id="name"></h2>
<p id="desc"></p>
<p class="price" id="price"></p>

<button onclick="addCart()">🛒 Thêm vào giỏ</button>
</div>

<script type="module">
import { db } from './js/firebase-config.js';
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

const id=new URLSearchParams(location.search).get("id");

const snap=await getDoc(doc(db,"products",id));
const p=snap.data();

img.src=p.imageUrl;
name.innerText=p.name;
desc.innerText=p.description;
price.innerText=p.price.toLocaleString()+" đ";

window.addCart=()=>{
let cart=JSON.parse(localStorage.getItem("hisuCart"))||[];
cart.push({name:p.name,price:p.price,quantity:1});
localStorage.setItem("hisuCart",JSON.stringify(cart));
alert("Đã thêm!");
}
</script>

</body>
</html>
