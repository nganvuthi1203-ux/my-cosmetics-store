<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên Mật Khẩu - Mint Cosmetics</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; margin-top: 50px; background-color: #ffe4e1; }
        .form-box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 320px; text-align: center;}
        input { width: 90%; padding: 10px; margin: 15px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #e91e63; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #c2185b; }
        .msg { font-size: 14px; margin-top: 15px; font-weight: bold; }
        .error { color: red; }
        .success { color: green; }
        a { color: #e91e63; text-decoration: none; font-weight: bold; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="form-box">
        <h2>Khôi phục mật khẩu</h2>
        <p style="font-size: 14px; color: #666; margin-bottom: 20px;">
            Nhập email bạn đã đăng ký. Chúng tôi sẽ gửi một đường link để bạn đặt lại mật khẩu mới.
        </p>
        
        <input type="email" id="resetEmail" placeholder="Nhập Email của bạn" required>
        <button id="btnReset">Gửi liên kết khôi phục</button>
        
        <p id="resetMsg" class="msg"></p>
        
        <p style="margin-top: 20px;">Quay lại <a href="dangnhap.html">Đăng nhập</a></p>
    </div>

    <script type="module">
        import { auth } from "./js/firebase-config.js";
        import { sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

        document.getElementById('btnReset').addEventListener('click', async () => {
            const email = document.getElementById('resetEmail').value;
            const msgEl = document.getElementById('resetMsg');
            
            // Xóa thông báo cũ
            msgEl.className = "msg";
            msgEl.innerText = "";

            if(!email) {
                msgEl.className = "msg error";
                msgEl.innerText = "Vui lòng nhập email của bạn!";
                return;
            }

            msgEl.style.color = "blue";
            msgEl.innerText = "Đang gửi yêu cầu...";

            try {
                // Gọi hàm của Firebase để gửi email khôi phục
                await sendPasswordResetEmail(auth, email);
                
                msgEl.className = "msg success";
                msgEl.innerText = "✅ Đã gửi email! Vui lòng kiểm tra hộp thư (hoặc thư mục Spam) của bạn.";
                
            } catch (error) {
                msgEl.className = "msg error";
                
                // Xử lý các mã lỗi thường gặp cho thân thiện với người dùng
                if (error.code === 'auth/user-not-found' || error.code === 'auth/invalid-credential') {
                    msgEl.innerText = "❌ Không tìm thấy tài khoản nào với email này.";
                } else if (error.code === 'auth/invalid-email') {
                    msgEl.innerText = "❌ Email không đúng định dạng.";
                } else {
                    msgEl.innerText = "❌ Lỗi: " + error.message;
                }
            }
        });
    </script>
</body>
</html>
